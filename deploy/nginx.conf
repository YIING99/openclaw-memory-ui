# Memory Web UI — Nginx reverse proxy configuration
# Add this location block inside your server {} block
#
# If you want to serve at root (/), change location to / and remove X-Script-Name
# If you want to serve at a sub-path (e.g. /memory/), use the config below

# Option A: Serve at sub-path /memory/
location /memory/ {
    proxy_pass http://127.0.0.1:5000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Script-Name /memory;
}

