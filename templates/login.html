{% extends "base.html" %}
{% block title %}{{ t("login.button") }}{% endblock %}

{% block content %}
<div class="login-container">
    <h1>{{ config.APP_TITLE }}</h1>
    <p class="login-subtitle">{{ config.APP_SUBTITLE }}</p>
    <form method="POST" class="login-form">
        <input type="password" name="password" placeholder="{{ t('login.placeholder') }}" autofocus required>
        <button type="submit" class="btn btn-primary">{{ t("login.button") }}</button>
    </form>
</div>
{% endblock %}
